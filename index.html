  const officeExts = ['doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp','rtf'];
  const archiveExts = ['zip','rar','7z','tar','gz','bz2','xz','iso'];
  const codeExts = ['js','jsx','ts','tsx','html','htm','css','scss','sass','less','php','py','rb','java','c','cpp','h','hpp','go','rs','swift','kt','sql','sh','bash','zsh','ps1'];
  const videoExts = ['mp4','webm','avi','mov','mkv','flv','wmv','m4v'];
  const audioExts = ['mp3','wav','ogg','flac','aac','m4a'];
  if (pdfExts.includes(ext)) return 'pdf';
  if (imageExts.includes(ext)) return 'image';
  if (textExts.includes(ext)) return 'text';
  if (officeExts.includes(ext)) return 'office';
  if (archiveExts.includes(ext)) return 'archive';
  if (codeExts.includes(ext)) return 'code';
  if (videoExts.includes(ext)) return 'video';
  if (audioExts.includes(ext)) return 'audio';
  return 'other';
}

function organizeIntoFolders(files) {
  const groups = new Map();
  files.forEach(file => {
    const type = file.type;
    if (!groups.has(type)) groups.set(type, []);
    groups.get(type).push(file);
  });
  const result = [];
  const otherFiles = [];
  for (const [type, fileList] of groups.entries()) {
    if (fileList.length > 3) {
      let folderName = "";
      switch(type) {
        case 'pdf': folderName = "Documents PDF"; break;
        case 'image': folderName = "Images"; break;
        case 'text': folderName = "Fichiers Texte"; break;
        case 'office': folderName = "Documents Office"; break;
        case 'archive': folderName = "Archives"; break;
        case 'code': folderName = "Fichiers Code"; break;
        case 'video': folderName = "Vidéos"; break;
        case 'audio': folderName = "Audio"; break;
        default: folderName = `Fichiers ${type.toUpperCase()}`;
      }
      result.push({
        id: `folder-${type}-${Date.now()}`,
        name: folderName,
        type: 'folder',
        itemType: type,
        count: fileList.length,
        files: fileList
      });
    } else {
      otherFiles.push(...fileList);
    }
  }
  result.push(...otherFiles);
  return result;
}
